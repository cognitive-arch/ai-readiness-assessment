version: "3.9"

# docker-compose.yml — AI Readiness full stack (frontend + backend + MongoDB)
#
# Usage:
#   docker compose up -d                  # start everything
#   docker compose up -d frontend         # start frontend only
#   docker compose logs -f frontend       # tail logs
#   docker compose down                   # stop all
#
# Build the frontend image with the backend URL baked in:
#   docker compose build frontend

services:

  # ── MongoDB ───────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: ai-readiness-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go Backend API ────────────────────────────────────
  api:
    build:
      context: ../ai-readiness-backend     # adjust path if needed
      dockerfile: Dockerfile
    container_name: ai-readiness-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ENV: production
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ai_readiness
      CORS_ORIGINS: "http://localhost:3000,http://frontend:3000"
      RATE_LIMIT_RPM: "120"
      PDF_TMP_DIR: /tmp/ai-readiness-pdfs
      LOG_LEVEL: info
      QUESTION_BANK_PATH: /app/question-bank-v1.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ──────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time — must point to where
        # users' browsers can reach the API (not the internal service name).
        # For local dev: http://localhost:8080
        # For production: https://api.yourdomain.com
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}"
    container_name: ai-readiness-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  mongo_data:
