name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ai-readiness-backend

jobs:
  # ─────────────────────────────────────────
  # Job 1 — Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m

  # ─────────────────────────────────────────
  # Job 2 — Unit + Integration Tests
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run unit tests (no DB)
        run: go test -race -count=1 -timeout=60s ./internal/scoring/... ./internal/handlers/... ./internal/config/...

      - name: Run integration tests (with MongoDB)
        env:
          MONGO_URI: mongodb://localhost:27017
          MONGO_DB: ai_readiness_test
          QUESTION_BANK_PATH: question-bank-v1.json
        run: go test -race -count=1 -timeout=120s -tags=integration ./tests/e2e/...

      - name: Coverage report
        env:
          MONGO_URI: mongodb://localhost:27017
          MONGO_DB: ai_readiness_test
          QUESTION_BANK_PATH: question-bank-v1.json
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic \
            ./internal/... ./tests/...
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out
          fail_ci_if_error: false

  # ─────────────────────────────────────────
  # Job 3 — Build binary (verify it compiles)
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-w -s \
              -X main.Version=${{ github.sha }} \
              -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o bin/server ./cmd/server

      - name: Verify binary runs
        run: |
          echo '{"domains":["Strategic"],"questions":[{"id":"s1","domain":"Strategic","text":"test","weight":1,"isCritical":false}]}' \
            > /tmp/bank.json
          timeout 3 ./bin/server || true  # will exit because MONGO_URI missing — that's fine

  # ─────────────────────────────────────────
  # Job 4 — Docker build & push (main only)
  # ─────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  # ─────────────────────────────────────────
  # Job 5 — Security scan (main only)
  # ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0   # warn only, don't fail build
          severity: CRITICAL,HIGH
