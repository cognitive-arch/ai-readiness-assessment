# .air.toml — hot-reload config for github.com/air-verse/air
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  delay = 500
  exclude_dir = ["tmp", "bin", "vendor", ".git"]
  include_ext = ["go", "json"]
  kill_delay = "500ms"
  rerun_delay = 500

[log]
  time = true

[color]
  build   = "yellow"
  runner  = "green"
  watcher = "cyan"
  main    = "magenta"

[misc]
  clean_on_exit = true
