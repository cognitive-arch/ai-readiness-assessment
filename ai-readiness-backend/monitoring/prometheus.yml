# monitoring/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: ai-readiness
    env: production

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: ai-readiness
    static_configs:
      - targets: ['api:8080']
    scrape_interval: 15s
    metrics_path: /metrics

  - job_name: mongodb
    static_configs:
      - targets: ['mongo-exporter:9216']
    scrape_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
