# monitoring/alertmanager.yml
# Configure receivers and routing for production alerts.
# Replace placeholder values with your real endpoints.

global:
  resolve_timeout: 5m
  smtp_from: "alerts@your-domain.com"
  smtp_smarthost: "smtp.your-domain.com:587"
  smtp_auth_username: "alerts@your-domain.com"
  smtp_auth_password: "${SMTP_PASSWORD}"

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "pagerduty-critical"
      continue: true

    - match:
        severity: warning
      receiver: "slack-warnings"

    - match:
        severity: info
      receiver: "slack-info"

receivers:
  - name: "default"
    email_configs:
      - to: "team@your-domain.com"
        send_resolved: true

  - name: "pagerduty-critical"
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_KEY}"
        description: "{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}"

  - name: "slack-warnings"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#ai-readiness-alerts"
        send_resolved: true
        title: "⚠ {{ .CommonAnnotations.summary }}"
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook }}
          {{ end }}

  - name: "slack-info"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#ai-readiness-info"
        send_resolved: false
        title: "ℹ {{ .CommonAnnotations.summary }}"
        text: "{{ .CommonAnnotations.description }}"

inhibit_rules:
  # Suppress warnings when critical is already firing for the same service
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
